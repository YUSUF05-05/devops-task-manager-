services:
  api:
    image: ghcr.io/kanass20/task-manager-api:prod
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - MONGO_URL=mongodb://db:27017/tasksdb

  db:
    image: mongo:6
    volumes:
      # This line ensures the database writes to the persistent volume
      - mongo_data:/data/db 

volumes:
  mongo_data: